name: Conditional Deployment

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'app.py'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Print Environment Variables
        run: env
      - name: Run Staging Container
        run: echo "docker run -d sakila-app:staging"
      - name: Generate Deployment Summary
        run: |
          echo "### :rocket: Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "The staging environment has been successfully updated." >> $GITHUB_STEP_SUMMARY
      - name: Send Notification
        run: |
          echo "Slack notification: Deployment to staging successful"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Production Container
        run: echo "docker run -d sakila-app:production"
      - name: Create Version Tag
        id: version
        run: echo "VERSION_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.VERSION_TAG }}
          body: "Automated production deployment triggered by pipeline."
      - name: Send Notification
        run: |
          echo "Slack notification: Deployment to production successful"